name: Build, Generate Bindings & Pack NuGet

on:
  workflow_dispatch:
    inputs:
      lighter_go_tag:
        description: "lighter-go release tag to pull native assets from"
        required: true
        default: "v1.0.6"
      package_version:
        description: "NuGet package version (e.g. 1.0.6)"
        required: true
        default: "1.0.6"
      publish_nuget:
        description: "Push package to NuGet.org"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "lighter-go.version"
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"
  NATIVE_DIR: src/Lighter.Native/runtimes

jobs:
  # ---------------------------------------------------------------------
  # 1) Pull official native assets (.dll/.so/.dylib + .h) from lighter-go
  # ---------------------------------------------------------------------
  fetch-native-assets:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          TAG="${{ github.event.inputs.lighter_go_tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(cat lighter-go.version 2>/dev/null || echo "v1.0.6")
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        working-directory: .
        continue-on-error: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Re-resolve tag (after checkout, file-based fallback)
        id: resolve2
        run: |
          TAG="${{ github.event.inputs.lighter_go_tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(cat lighter-go.version 2>/dev/null || echo "v1.0.6")
          fi
          echo "Using lighter-go tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          TAG: ${{ steps.resolve2.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p downloaded
          BASE="https://github.com/elliottech/lighter-go/releases/download/${TAG}"

          ASSETS=(
            "lighter-signer-windows-amd64.dll"
            "lighter-signer-windows-amd64.h"
            "lighter-signer-linux-amd64.so"
            "lighter-signer-linux-amd64.h"
            "lighter-signer-linux-arm64.so"
            "lighter-signer-linux-arm64.h"
            "lighter-signer-darwin-arm64.dylib"
            "lighter-signer-darwin-arm64.h"
          )

          for asset in "${ASSETS[@]}"; do
            echo "Downloading $asset"
            curl -fSL --retry 3 -o "downloaded/$asset" "$BASE/$asset"
          done

          ls -la downloaded/

      # Verify all 4 platform headers declare the SAME exported functions
      # with the SAME signatures. We deliberately do NOT diff the full
      # header file. cgo headers contain a large block of typedef/preamble
      # boilerplate (GoInt, GoUint8, size_t-style platform base types) ahead
      # of the actual function declarations, and cgo is free to resolve
      # those typedefs differently per GOOS/GOARCH (e.g. different widths
      # for platform-native integer types) without it meaning anything for
      # us — ClangSharp resolves through to the underlying fixed-width C
      # type either way. The only thing that actually matters for codegen
      # correctness is whether the `extern ... FunctionName(...)` lines
      # themselves match, so we grep those out specifically, strip the
      # Windows-only __declspec(dllexport) export keyword, and diff just
      # that.
      - name: Verify headers declare identical signatures across platforms
        run: |
          set -euo pipefail
          cd downloaded
          extract_signatures() {
            grep -E '^\s*extern\s' "$1" \
              | grep -v '_GoString_\|_GoStringPtr\|_GoStringLen\|^extern.*\b_Go' \
              | sed 's/__declspec(dllexport) //g' \
              | sed 's/long long int/long long/g' \
              | sed 's/long long unsigned int/unsigned long long/g' \
              | sed 's/(void)/()/g' \
              | sed 's/[[:space:]]\+/ /g' \
              | sort
          }
          # Linux header as canonical: __declspec is MSVC-specific and not
          # reliably understood by libclang/ClangSharp without an explicit
          # MSVC target triple, so generating from the Windows header risks
          # ClangSharp choking on a keyword it doesn't need. The exported
          # .dll/.so/.dylib symbol names are unaffected either way, since
          # DllImport matches by name, not by how the header was annotated.
          REF="lighter-signer-linux-amd64.h"
          extract_signatures "$REF" > /tmp/ref.sigs.txt

          for h in lighter-signer-windows-amd64.h lighter-signer-linux-arm64.h lighter-signer-darwin-arm64.h; do
            extract_signatures "$h" > "/tmp/$h.sigs.txt"
            if ! diff -q /tmp/ref.sigs.txt "/tmp/$h.sigs.txt" > /dev/null; then
              echo "::error::Function signatures in $h differ from $REF — this is a genuine API divergence, not just preamble/typedef noise."
              echo "::error::Manual review required before codegen can proceed safely."
              diff /tmp/ref.sigs.txt "/tmp/$h.sigs.txt" || true
              exit 1
            fi
          done
          echo "All headers declare identical function signatures. Safe to use $REF as canonical source."
          cp "$REF" canonical-lighter-signer.h

      - name: Upload native assets
        uses: actions/upload-artifact@v4
        with:
          name: native-assets
          path: downloaded/
          retention-days: 7

  # ---------------------------------------------------------------------
  # 2) Generate P/Invoke bindings from the canonical header via ClangSharp
  # ---------------------------------------------------------------------
  generate-bindings:
    needs: fetch-native-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download native assets
        uses: actions/download-artifact@v4
        with:
          name: native-assets
          path: downloaded

      - name: Install libclang for ClangSharp
        # ClangSharp checks the libClang version string at startup and
        # rejects mismatches outright. ClangSharpPInvokeGenerator's version
        # number tracks the LLVM major version it expects (18.1.0 wants a
        # version string containing "version 18.1", 21.x wants "21.1", etc.)
        # — this was discovered empirically across several failed attempts:
        # latest ClangSharp (21.x) rejected libclang-14 ("does not contain
        # version 21.1"), and pinning ClangSharp down to 18.1.0 then
        # rejected libclang-14 too ("does not contain version 18.1"), which
        # is what tells us the fix is on the libclang side, not the
        # ClangSharp side: install libclang-18-dev to match the already-
        # pinned ClangSharp 18.1.0 below. libclang-18-dev is available
        # directly in Ubuntu noble's own apt repos (no apt.llvm.org repo
        # needed) per https://packages.ubuntu.com/noble/devel/llvm-18.
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y libclang-18-dev

          echo "::group::Locate all libclang* files on the system"
          find /usr/lib /usr/local/lib /lib -iname '*libclang*' 2>/dev/null | xargs -r ls -la
          echo "::endgroup::"

          CLANG_SO=$(find /usr/lib /usr/local/lib /lib -name 'libclang-18.so' 2>/dev/null | head -n1)
          if [ -z "$CLANG_SO" ]; then
            CLANG_SO=$(find /usr/lib /usr/local/lib /lib -name 'libclang-18.so*' 2>/dev/null | head -n1)
          fi
          if [ -z "$CLANG_SO" ]; then
            echo "::error::Could not locate any libclang-18.so* after apt install."
            exit 1
          fi
          echo "Selected CLANG_SO=$CLANG_SO"

          for dir in /usr/lib/x86_64-linux-gnu /usr/lib /usr/local/lib; do
            sudo mkdir -p "$dir"
            sudo ln -sf "$CLANG_SO" "$dir/libclang.so"
          done
          sudo ldconfig || true

          echo "::group::Post-symlink state"
          find /usr/lib /usr/local/lib /lib -iname 'libclang.so' 2>/dev/null | xargs -r ls -la
          ldconfig -p | grep -i libclang || echo "(nothing matched — expected if ldconfig only tracks versioned sonames)"
          echo "::endgroup::"

          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/lib:/usr/local/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Install ClangSharpPInvokeGenerator
        # Pinned to 18.1.0 to match the libclang-18 installed above.
        # ClangSharp's major.minor must match libClang's reported version
        # string exactly (it does a substring check at startup) — see the
        # comment on the libclang install step for how this was determined.
        # If apt's available libclang-N-dev version ever changes (e.g. a
        # future Ubuntu LTS image), this pin and the libclang-N-dev package
        # name above both need to move together; check
        # https://www.nuget.org/packages/ClangSharpPInvokeGenerator for
        # which release matches the new N.
        run: |
          dotnet tool install --global ClangSharpPInvokeGenerator --version 18.1.0
          echo "::group::Confirm tool installed + its own native deps"
          ls -la ~/.dotnet/tools/
          find ~/.dotnet -iname '*libclang*' 2>/dev/null | xargs -r ls -la || echo "(ClangSharp shipped no bundled libclang)"
          echo "::endgroup::"

      - name: Install libClangSharp native dependency
        # ClangSharp needs TWO native libraries, not one: libclang (handled
        # above, comes from apt) AND libClangSharp — a separate helper
        # library that ClangSharp's own project ships to expose Clang APIs
        # missing from libClang itself. This is NOT installable via apt; it
        # only exists as a NuGet package (libClangSharp.runtime.linux-x64),
        # and the dotnet-tool installer does not pull it in automatically —
        # this is the exact limitation called out in the
        # "Failed to resolve libClangSharp" / "*****IMPORTANT*****" message
        # ClangSharp itself prints, with a pointer to
        # https://github.com/dotnet/clangsharp for the manual-copy steps.
        # We download the .nupkg directly from nuget.org's flat-container
        # API (it's a zip), extract the .so, and place it next to where the
        # ClangSharpPInvokeGenerator dotnet-tool actually looks (its own
        # tool .store directory) — confirmed from the previous failure's
        # stack trace, which showed the exact search paths attempted.
        run: |
          set -euo pipefail
          which unzip > /dev/null || sudo apt-get install -y unzip
          PKG_VERSION="18.1.3.1"
          PKG_URL="https://api.nuget.org/v3-flatcontainer/libclangsharp.runtime.linux-x64/${PKG_VERSION}/libclangsharp.runtime.linux-x64.${PKG_VERSION}.nupkg"
          echo "Downloading $PKG_URL"
          if ! curl -fSL -o /tmp/libclangsharp.nupkg "$PKG_URL"; then
            echo "::error::Could not download libClangSharp.runtime.linux-x64 version $PKG_VERSION."
            echo "::error::This version was inferred from the win-x64 sibling package and may not exist for linux-x64."
            echo "::group::Available versions (for manual lookup)"
            curl -fSL "https://api.nuget.org/v3-flatcontainer/libclangsharp.runtime.linux-x64/index.json" || true
            echo "::endgroup::"
            exit 1
          fi

          mkdir -p /tmp/libclangsharp-extracted
          unzip -o /tmp/libclangsharp.nupkg -d /tmp/libclangsharp-extracted > /dev/null

          echo "::group::Contents of extracted nupkg"
          find /tmp/libclangsharp-extracted -iname '*.so*'
          echo "::endgroup::"

          SO_FILE=$(find /tmp/libclangsharp-extracted -iname 'libClangSharp.so' | head -n1)
          if [ -z "$SO_FILE" ]; then
            SO_FILE=$(find /tmp/libclangsharp-extracted -iname 'libClangSharp.so*' | head -n1)
          fi
          if [ -z "$SO_FILE" ]; then
            echo "::error::Could not find libClangSharp.so inside the downloaded nupkg."
            exit 1
          fi
          echo "Found SO_FILE=$SO_FILE"

          # Place it everywhere the previous failure's stack trace showed
          # ClangSharp actually probing: the dotnet-tool's own .store tool
          # directory, plus the standard search dirs as a fallback.
          TOOL_DIR=$(find ~/.dotnet/tools/.store/clangsharppinvokegenerator -maxdepth 5 -type d -iname 'any' 2>/dev/null | head -n1)
          echo "TOOL_DIR=$TOOL_DIR"
          if [ -n "$TOOL_DIR" ]; then
            cp "$SO_FILE" "$TOOL_DIR/libClangSharp.so"
          fi

          for dir in /usr/lib/x86_64-linux-gnu /usr/lib /usr/local/lib; do
            sudo cp "$SO_FILE" "$dir/libClangSharp.so"
          done
          sudo ldconfig || true

          echo "::group::Verify libClangSharp.so is now in place"
          find ~/.dotnet/tools /usr/lib /usr/local/lib -iname 'libClangSharp.so' 2>/dev/null | xargs -r ls -la
          echo "::endgroup::"

      - name: Generate raw bindings
        run: |
          set -uo pipefail   # NOTE: -e deliberately omitted here — we want
                              # the diagnostic dump below to run even if the
                              # generator call fails, then exit non-zero
                              # ourselves afterward.
          mkdir -p generated

          echo "::group::Environment going into ClangSharp call"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "PATH=$PATH"
          GENERATOR_DLL=$(find ~/.dotnet/tools -iname 'ClangSharpPInvokeGenerator.dll' 2>/dev/null | head -n1)
          echo "GENERATOR_DLL=$GENERATOR_DLL"
          echo "::endgroup::"

          ~/.dotnet/tools/ClangSharpPInvokeGenerator \
            -f downloaded/canonical-lighter-signer.h \
            -n Lighter.Native.Generated \
            -l lighter_signer \
            -c exclude-enum-operators \
            -o generated/NativeMethods.g.cs \
            --methodClassName NativeMethods \
            --config latest-codegen generate-macro-bindings unix-types
          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "::error::ClangSharpPInvokeGenerator exited with status $STATUS."
            echo "::group::Full libclang search state at time of failure"
            find /usr/lib /usr/local/lib /lib -iname '*libclang*' 2>/dev/null | xargs -r ls -la
            echo "LD_LIBRARY_PATH was: $LD_LIBRARY_PATH"
            echo "::endgroup::"
            exit $STATUS
          fi

      - name: Show generated output (for PR review)
        run: cat generated/NativeMethods.g.cs

      - name: Validate struct-by-value return signatures
        # The .h declares SignedTxResponse / ApiKeyResponse / StrOrErr as
        # struct-by-value RETURN types from extern "C" functions. This is the
        # one part of the cgo header that is genuinely ABI-risky (different
        # calling conventions classify small structs with pointer fields
        # differently on x64 SysV vs ARM64 AAPCS vs Windows x64). We don't
        # trust ClangSharp's default marshalling blindly here — fail the
        # build if the generated file doesn't contain explicit StructLayout
        # attributes on these three types, which is the manual fix-up this
        # repo applies in src/Lighter.Native/StructFixups.cs.
        run: |
          set -euo pipefail
          for t in SignedTxResponse ApiKeyResponse StrOrErr CreateOrderTxReq; do
            if ! grep -q "struct $t" generated/NativeMethods.g.cs; then
              echo "::error::Expected struct '$t' not found in generated bindings. Header may have changed shape."
              exit 1
            fi
          done

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: generated-bindings
          path: generated/NativeMethods.g.cs
          retention-days: 7

  # ---------------------------------------------------------------------
  # 3) Build the managed wrapper + run struct-marshalling smoke tests
  #    against every officially released native lib.
  #
  #    NOTE: osx-x64 (Intel Mac) is intentionally NOT covered. lighter-go's
  #    releases only ship darwin-arm64; there is no upstream darwin-amd64
  #    asset, and we deliberately decided not to cross-compile it ourselves
  #    (would require an osxcross SDK toolchain in CI). Supported RIDs are:
  #    win-x64, linux-x64, linux-arm64, osx-arm64.
  # ---------------------------------------------------------------------
  build-managed:
    needs: [fetch-native-assets, generate-bindings]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download native assets
        uses: actions/download-artifact@v4
        with:
          name: native-assets
          path: downloaded

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: generated-bindings
          path: src/Lighter.Native/Generated

      - name: Lay out runtimes/ folder (RID-specific native assets)
        run: |
          set -euo pipefail
          d=src/Lighter.Native/runtimes
          mkdir -p "$d/win-x64/native" "$d/linux-x64/native" "$d/linux-arm64/native" "$d/osx-arm64/native"

          cp downloaded/lighter-signer-windows-amd64.dll "$d/win-x64/native/lighter_signer.dll"
          cp downloaded/lighter-signer-linux-amd64.so    "$d/linux-x64/native/liblighter_signer.so"
          cp downloaded/lighter-signer-linux-arm64.so    "$d/linux-arm64/native/liblighter_signer.so"
          cp downloaded/lighter-signer-darwin-arm64.dylib "$d/osx-arm64/native/liblighter_signer.dylib"

      - name: Restore & build managed wrapper
        run: dotnet build src/Lighter.Native/Lighter.Native.csproj -c Release

      - name: Run smoke tests (struct marshalling, GenerateAPIKey round-trip)
        run: dotnet test tests/Lighter.Native.Tests/Lighter.Native.Tests.csproj -c Release

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: managed-build
          path: src/Lighter.Native/bin/Release/
          retention-days: 7

  # ---------------------------------------------------------------------
  # 4) Pack NuGet (multi-RID native package) — manual approval to publish
  # ---------------------------------------------------------------------
  pack-and-publish:
    needs: build-managed
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Re-assemble runtimes/ for packing
        run: |
          set -euo pipefail
          d=src/Lighter.Native/runtimes
          mkdir -p "$d/win-x64/native" "$d/linux-x64/native" "$d/linux-arm64/native" "$d/osx-arm64/native"
          cp artifacts/native-assets/lighter-signer-windows-amd64.dll "$d/win-x64/native/lighter_signer.dll"
          cp artifacts/native-assets/lighter-signer-linux-amd64.so    "$d/linux-x64/native/liblighter_signer.so"
          cp artifacts/native-assets/lighter-signer-linux-arm64.so    "$d/linux-arm64/native/liblighter_signer.so"
          cp artifacts/native-assets/lighter-signer-darwin-arm64.dylib "$d/osx-arm64/native/liblighter_signer.dylib"
          # osx-x64 intentionally unsupported — see README "Supported platforms".

      - name: Pack
        run: |
          dotnet pack src/Lighter.Native/Lighter.Native.csproj \
            -c Release \
            -p:PackageVersion=${{ github.event.inputs.package_version }} \
            -o nupkg

      - name: Upload .nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkg/*.nupkg

      - name: Push to NuGet.org
        if: ${{ github.event.inputs.publish_nuget == 'true' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::error::NUGET_API_KEY secret not set. Add it under Settings > Secrets before enabling publish."
            exit 1
          fi
          dotnet nuget push "nupkg/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate